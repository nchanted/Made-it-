name: Build APK

# Builds the installable APK on every push, on pull requests, and when you
# manually trigger it. The finished APK appears under the run's "Artifacts",
# and is also attached to a GitHub Release whenever you push a tag like v1.0.

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/made-it.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: made-it-apk
          path: dist/made-it.apk
          if-no-files-found: error

      - name: Attach APK to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/made-it.apk
